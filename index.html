<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DermaPlan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Cairo','Plus Jakarta Sans',sans-serif;
  background:#F7F5F2;color:#1A1A1A;min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
[dir="ltr"] body{font-family:'Plus Jakarta Sans','Cairo',sans-serif}
[dir="rtl"] *{letter-spacing:0 !important}

/* ========== LANGUAGE SCREEN ========== */
.lang-screen{
position:fixed;inset:0;z-index:9000;
background:#F7F5F2;
display:flex;align-items:center;justify-content:center;
transition:opacity .5s ease, visibility .5s;
}
.lang-screen.hide{opacity:0;visibility:hidden;pointer-events:none}
.lang-inner{text-align:center;padding:24px;width:100%;max-width:360px}

.lang-logo{
width:64px;height:64px;border-radius:18px;background:#1B6B4A;
margin:0 auto 32px;display:flex;align-items:center;justify-content:center;
box-shadow:0 8px 24px rgba(27,107,74,.2);
}
.lang-logo svg{width:28px;height:28px}

.lang-title{font-size:1.8rem;font-weight:800;color:#1A1A1A;margin-bottom:6px}
.lang-sub{font-size:.88rem;color:#7A7A7A;margin-bottom:40px}

.lang-btns{display:flex;flex-direction:column;gap:12px}
.lang-btn{
padding:18px;border-radius:14px;font-size:1.05rem;font-weight:700;
cursor:pointer;font-family:‘Cairo’,sans-serif;transition:all .25s;border:none;
}
.lang-btn-ar{background:#1B6B4A;color:#fff}
.lang-btn-ar:hover{background:#15573C;transform:translateY(-2px);box-shadow:0 8px 24px rgba(27,107,74,.25)}
.lang-btn-en{background:#fff;color:#1A1A1A;border:2px solid #D4D0CB}
.lang-btn-en:hover{border-color:#1B6B4A;color:#1B6B4A;transform:translateY(-2px)}

/* ========== APP ========== */
.app{
max-width:580px;margin:0 auto;padding:0 20px 80px;
opacity:0;transform:translateY(16px);transition:all .5s ease .2s;
}
.app.show{opacity:1;transform:none}

/* ========== HEADER ========== */
.hdr{
display:flex;align-items:center;justify-content:space-between;
padding:18px 0;position:sticky;top:0;z-index:100;background:#F7F5F2;
}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-icon{
width:34px;height:34px;border-radius:10px;background:#1B6B4A;
display:flex;align-items:center;justify-content:center;
}
.hdr-icon svg{width:16px;height:16px}
.hdr-name{font-weight:800;font-size:1.05rem;color:#1A1A1A}
.hdr-sw{
padding:7px 18px;border-radius:50px;border:1.5px solid #D4D0CB;
background:#fff;font-size:.78rem;font-weight:700;color:#7A7A7A;
cursor:pointer;font-family:inherit;transition:all .2s;
}
.hdr-sw:hover{border-color:#1B6B4A;color:#1B6B4A}

/* ========== PAGE TITLE ========== */
.page-title{padding:28px 0 24px}
.page-title .over{
font-size:.7rem;font-weight:700;color:#1B6B4A;
text-transform:uppercase;margin-bottom:12px;
display:flex;align-items:center;gap:8px;
}
[dir=“ltr”] .page-title .over{letter-spacing:.15em !important}
.page-title .over::before{
content:’’;width:20px;height:2.5px;background:#1B6B4A;border-radius:2px;
}
.page-title h1{
font-size:1.6rem;font-weight:800;line-height:1.4;color:#1A1A1A;margin-bottom:10px;
}
.page-title p{font-size:.9rem;color:#7A7A7A;line-height:1.8}

/* ========== FORM BLOCKS ========== */
.fb{
background:#FFFFFF;border-radius:18px;padding:24px 22px;margin-bottom:16px;
border:1.5px solid #E8E4DF;
transition:border-color .3s, box-shadow .3s;
}
.fb:focus-within{border-color:#1B6B4A;box-shadow:0 0 0 4px rgba(27,107,74,.08)}

.fb-label{
font-size:.75rem;font-weight:700;color:#7A7A7A;
text-transform:uppercase;margin-bottom:16px;
display:flex;align-items:center;gap:10px;
}
[dir=“ltr”] .fb-label{letter-spacing:.1em !important}
.fb-num{
width:24px;height:24px;border-radius:7px;background:#1B6B4A;color:#fff;
display:inline-flex;align-items:center;justify-content:center;
font-size:.7rem;font-weight:800;
}

/* Type cards */
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.type-card{
border:2px solid #E8E4DF;border-radius:14px;padding:20px 14px;
text-align:center;cursor:pointer;transition:all .25s;background:#fff;
}
.type-card:hover{border-color:#ABABAB}
.type-card.on{border-color:#1B6B4A;background:rgba(27,107,74,.06)}
.type-card .tc-ico{
width:48px;height:48px;border-radius:14px;margin:0 auto 12px;
display:flex;align-items:center;justify-content:center;font-size:1.6rem;
}
.type-card[data-v=“skin”] .tc-ico{background:#FDDCB5}
.type-card[data-v=“hair”] .tc-ico{background:#C8E6C9}
.type-card .tc-txt{font-weight:700;font-size:.95rem;color:#1A1A1A}
.type-card.on .tc-txt{color:#1B6B4A}

/* Sub buttons */
.sub-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sub-btn{
padding:14px 10px;border:2px solid #E8E4DF;border-radius:12px;
background:#fff;font-size:.88rem;font-weight:700;color:#3D3D3D;
cursor:pointer;font-family:inherit;transition:all .25s;text-align:center;
}
.sub-btn:hover{border-color:#ABABAB}
.sub-btn.on{border-color:#1B6B4A;color:#1B6B4A;background:rgba(27,107,74,.06)}

/* Textarea */
.ta{
width:100%;min-height:110px;padding:16px;border:2px solid #E8E4DF;
border-radius:14px;background:#FBF9F7;font-size:.95rem;font-family:inherit;
color:#1A1A1A;resize:vertical;transition:border-color .25s;line-height:1.9;
}
.ta:focus{outline:none;border-color:#1B6B4A}
.ta::placeholder{color:#ABABAB}
.ta-hint{font-size:.76rem;color:#ABABAB;margin-top:10px;line-height:1.7}

/* Submit */
.go-btn{
width:100%;padding:18px;border:none;border-radius:14px;
background:#1B6B4A;color:#fff;font-size:1.05rem;font-weight:700;
cursor:pointer;font-family:inherit;transition:all .25s;
display:flex;align-items:center;justify-content:center;gap:8px;
margin-top:8px;
}
.go-btn:hover:not(:disabled){background:#15573C;transform:translateY(-2px);box-shadow:0 8px 24px rgba(27,107,74,.2)}
.go-btn:disabled{opacity:.35;cursor:not-allowed}
.go-btn .go-spin{display:none;width:20px;height:20px;border:2.5px solid rgba(255,255,255,.3);
border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
.go-btn.busy .go-txt{display:none}
.go-btn.busy .go-spin{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ========== RESULTS ========== */
.results{margin-top:32px;animation:up .5s ease both}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

.res-hdr{margin-bottom:24px}
.res-hdr .over{
font-size:.7rem;font-weight:700;color:#C4704B;
text-transform:uppercase;margin-bottom:10px;
display:flex;align-items:center;gap:8px;
}
[dir=“ltr”] .res-hdr .over{letter-spacing:.15em !important}
.res-hdr .over::before{content:’’;width:20px;height:2.5px;background:#C4704B;border-radius:2px}
.res-hdr h2{font-size:1.4rem;font-weight:800;color:#1A1A1A;margin-bottom:6px}
.res-hdr p{font-size:.85rem;color:#7A7A7A}

/* Pharmacy */
.ph{margin-bottom:14px;border-radius:16px;overflow:hidden;border:1.5px solid #E8E4DF;background:#fff}
.ph-bar{
padding:16px 20px;display:flex;align-items:center;gap:12px;
cursor:pointer;transition:background .2s;
}
.ph-bar:hover{background:#FBF9F7}
.ph-dot{width:12px;height:12px;border-radius:5px;flex-shrink:0}
.ph.nh .ph-dot{background:#1B8C5A}
.ph.un .ph-dot{background:#2B5EA7}
.ph.dw .ph-dot{background:#A73B2B}
.ph-info{flex:1}
.ph-name{font-weight:700;font-size:.92rem;color:#1A1A1A}
.ph-en{font-size:.72rem;color:#ABABAB;margin-top:1px}
.ph-cnt{
font-size:.7rem;font-weight:700;padding:4px 12px;border-radius:8px;flex-shrink:0;
}
.ph.nh .ph-cnt{background:#EDFFF5;color:#1B8C5A}
.ph.un .ph-cnt{background:#EBF4FF;color:#2B5EA7}
.ph.dw .ph-cnt{background:#FFF0EE;color:#A73B2B}
.ph-arr{
width:26px;height:26px;border-radius:8px;background:#F7F5F2;
display:flex;align-items:center;justify-content:center;
font-size:.6rem;color:#7A7A7A;transition:transform .3s;flex-shrink:0;
}
.ph.open .ph-arr{transform:rotate(180deg)}
.ph-body{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.22,1,.36,1)}
.ph.open .ph-body{max-height:5000px}
.ph-inner{padding:6px 14px 14px}

/* Product */
.pr{
background:#FBF9F7;border-radius:14px;padding:16px 18px;margin-bottom:10px;
border:1px solid #E8E4DF;transition:all .2s;
}
.pr:last-child{margin-bottom:0}
.pr:hover{box-shadow:0 4px 14px rgba(0,0,0,.05);transform:translateY(-1px)}
.pr-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.pr-cat{
font-size:.62rem;font-weight:700;text-transform:uppercase;
padding:4px 10px;border-radius:6px;
}
.ph.nh .pr-cat{background:#EDFFF5;color:#1B8C5A;border:1px solid #C8E6D8}
.ph.un .pr-cat{background:#EBF4FF;color:#2B5EA7;border:1px solid #C3D5ED}
.ph.dw .pr-cat{background:#FFF0EE;color:#A73B2B;border:1px solid #EDCBC3}
.pr-link{
padding:6px 14px;border-radius:8px;border:1.5px solid rgba(27,107,74,.2);
background:rgba(27,107,74,.06);font-size:.74rem;font-weight:700;color:#1B6B4A;
text-decoration:none;transition:all .2s;flex-shrink:0;
}
.pr-link:hover{background:#1B6B4A;color:#fff;border-color:#1B6B4A}
.pr-name{font-weight:700;font-size:.95rem;color:#1A1A1A;margin-bottom:4px;direction:ltr;unicode-bidi:plaintext}
[dir=“rtl”] .pr-name{text-align:right}
.pr-use{font-size:.82rem;color:#7A7A7A;line-height:1.8}

/* Instructions */
.ins{
background:#fff;border-radius:16px;padding:22px;margin-top:18px;border:1.5px solid #E8E4DF;
}
.ins h4{font-weight:700;font-size:.95rem;color:#1A1A1A;margin-bottom:12px}
.ins ol{padding-inline-start:18px}
.ins li{font-size:.85rem;color:#3D3D3D;line-height:2.1}

/* Again */
.again-btn{
display:flex;align-items:center;justify-content:center;gap:8px;
margin:24px auto 0;padding:14px 28px;border-radius:50px;
border:2px solid #D4D0CB;background:#fff;
font-size:.88rem;font-weight:700;color:#7A7A7A;cursor:pointer;
font-family:inherit;transition:all .2s;
}
.again-btn:hover{border-color:#1B6B4A;color:#1B6B4A}

/* Messages */
.msg{text-align:center;padding:20px;border-radius:14px;margin-top:16px;font-size:.88rem;font-weight:600}
.msg-err{background:#FFF0EE;color:#A73B2B;border:1px solid #EDCBC3}
.msg-lim{background:#FFF8EE;color:#C4704B;border:1px solid #F0D8C0}

.foot{text-align:center;margin-top:48px;font-size:.72rem;color:#ABABAB}

@media(max-width:400px){
.type-grid,.sub-grid{grid-template-columns:1fr 1fr}
.pr-link{width:100%;text-align:center;margin-top:6px}
.page-title h1{font-size:1.35rem}
}
</style>

</head>

<script>
var LIM=50,STK='dp5',lang='ar',vT=null,vS=null;

var I={
  ar:{
    sw:'English',
    ov:'DermaPlan · مستشارك الجلدي',
    h1:'احصل على خطة علاجية مخصصة لبشرتك أو شعرك',
    pp:'وصّف مشكلتك وسنقترح لك المنتجات المناسبة من الصيدليات السعودية',
    l1:'نوع المشكلة',l2:'نوع البشرة أو الشعر',l3:'وصف المشكلة',
    skin:'بشرة',hair:'شعر',
    oily:'دهني',dry:'جاف',combo:'مختلط',normal:'عادي',
    hint:'مثال: حبوب ملتهبة في الخدين · قشرة وحكة شديدة · تساقط الشعر · جفاف واحمرار',
    goTxt:'ابدأ التحليل',
    rOv:'النتيجة',rH:'خطتك العلاجية جاهزة',rP:'منتجات حقيقية من الصيدليات السعودية',
    nahdi:'صيدلية النهدي',nahdiE:'Al Nahdi',
    united:'الصيدليات المتحدة',unitedE:'United',
    dawaa:'صيدلية الدواء',dawaaE:'Al Dawaa',
    vw:'فتح',insT:'خطوات الاستخدام',
    re:'تحليل جديد',
    fill:'يرجى تعبئة جميع الحقول',
    limM:'تم استنفاد المحاولات اليومية — حاول غداً',
    errM:'حدث خطأ — يرجى المحاولة مرة أخرى',
    ft:'DermaPlan · تحليل ذكي للعناية بالبشرة والشعر',
    itm:'منتج'
  },
  en:{
    sw:'العربية',
    ov:'DermaPlan · Your Skin Advisor',
    h1:'Get a personalized treatment plan for your skin or hair',
    pp:'Describe your concern and we\'ll suggest suitable products from Saudi pharmacies',
    l1:'Problem Type',l2:'Skin or Hair Type',l3:'Describe Your Concern',
    skin:'Skin',hair:'Hair',
    oily:'Oily',dry:'Dry',combo:'Combination',normal:'Normal',
    hint:'e.g. Inflamed acne on cheeks · Severe dandruff · Hair thinning · Dry skin with redness',
    goTxt:'Start Analysis',
    rOv:'Results',rH:'Your treatment plan is ready',rP:'Real products from Saudi pharmacies',
    nahdi:'Al Nahdi',nahdiE:'صيدلية النهدي',
    united:'United Pharmacies',unitedE:'المتحدة',
    dawaa:'Al Dawaa',dawaaE:'الدواء',
    vw:'Open',insT:'How to Use',
    re:'New Analysis',
    fill:'Please fill in all fields',
    limM:'Daily limit reached — try again tomorrow',
    errM:'Something went wrong — please try again',
    ft:'DermaPlan · AI-powered skin & hair analysis',
    itm:'products'
  }
};
function t(k){return I[lang][k]||k}

function getU(){try{var d=JSON.parse(localStorage.getItem(STK)||'{}');var td=new Date().toISOString().slice(0,10);return d.d===td?d:{d:td,c:0}}catch(e){return{d:new Date().toISOString().slice(0,10),c:0}}}
function incU(){var u=getU();u.c++;localStorage.setItem(STK,JSON.stringify(u))}
function rem(){return Math.max(0,LIM-getU().c)}

function ui(){
  var d=lang==='ar'?'rtl':'ltr';
  document.documentElement.lang=lang;
  document.documentElement.dir=d;
  document.body.dir=d;
  document.getElementById('sw').textContent=t('sw');
  document.getElementById('ov').textContent=t('ov');
  document.getElementById('h1').textContent=t('h1');
  document.getElementById('pp').textContent=t('pp');
  document.getElementById('l1').textContent=t('l1');
  document.getElementById('l2').textContent=t('l2');
  document.getElementById('l3').textContent=t('l3');
  document.getElementById('tSkin').textContent=t('skin');
  document.getElementById('tHair').textContent=t('hair');
  document.getElementById('sO').textContent=t('oily');
  document.getElementById('sD').textContent=t('dry');
  document.getElementById('sC').textContent=t('combo');
  document.getElementById('sN').textContent=t('normal');
  document.getElementById('ta').placeholder='...';
  document.getElementById('hint').textContent=t('hint');
  document.getElementById('goTxt').textContent=t('goTxt');
  document.getElementById('ft').textContent=t('ft');
}

function go(l){
  lang=l;
  document.getElementById('ls').classList.add('hide');
  document.getElementById('app').classList.add('show');
  ui();
}
function flip(){lang=lang==='ar'?'en':'ar';ui()}

function pickT(el){
  var all=document.querySelectorAll('.type-card');
  for(var i=0;i<all.length;i++) all[i].classList.remove('on');
  el.classList.add('on');
  vT=el.getAttribute('data-v');
}
function pickS(el){
  var all=document.querySelectorAll('.sub-btn');
  for(var i=0;i<all.length;i++) all[i].classList.remove('on');
  el.classList.add('on');
  vS=el.getAttribute('data-v');
}

function run(){
  var txt=document.getElementById('ta').value.trim();
  if(!vT||!vS||!txt){showMsg('err',t('fill'));return}
  if(rem()<=0){showMsg('lim',t('limM'));return}

  var btn=document.getElementById('goBtn');
  btn.classList.add('busy');btn.disabled=true;
  document.getElementById('out').innerHTML='';

  var ln=lang==='ar'?'Arabic':'English';

  var sys='You are a clinical dermatology/trichology advisor for Saudi Arabia. Recommend REAL products from Saudi pharmacies. ONLY valid JSON output, no markdown fences.\n\nRules:\n- Product names ALWAYS in English. Other text in '+ln+'.\n- Simple issues: 1-2 categories. Complex: more as needed.\n- Each category: 1 product per pharmacy (nahdi, united, dawaa).\n- URLs: nahdi=https://www.nahdionline.com/en/catalogsearch/result/?q=ENCODED_NAME united=https://www.unitedpharmacy.sa/en/catalogsearch/result/?q=ENCODED_NAME dawaa=https://www.al-dawaa.com/catalogsearch/result/?q=ENCODED_NAME\n- Concise clinical usage instructions.\n\nJSON: {"categories":[{"category":"name in '+ln+'","products":[{"pharmacy":"nahdi","name":"English","usage":"'+ln+'","url":"URL"},{"pharmacy":"united","name":"...","usage":"...","url":"..."},{"pharmacy":"dawaa","name":"...","usage":"...","url":"..."}]}],"instructions":["step1","step2"]}';

  var usr='Type:'+vT+'\nSubtype:'+vS+'\nComplaint:'+txt+'\nLang:'+ln;

  fetch(APP_CONFIG.ai.endpoint,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+_dk()},
    body:JSON.stringify({model:APP_CONFIG.ai.model,messages:[{role:'system',content:sys},{role:'user',content:usr}],temperature:0.3,max_tokens:4000})
  })
  .then(function(r){
    if(!r.ok) throw new Error(r.status);
    return r.json();
  })
  .then(function(d){
    var raw=d.choices[0].message.content.trim();
    if(raw.indexOf('```')===0) raw=raw.replace(/^```(?:json)?\s*/,'').replace(/\s*```$/,'');
    var result=JSON.parse(raw);
    incU();
    render(result);
  })
  .catch(function(e){
    console.error(e);
    showMsg('err',t('errM'));
  })
  .finally(function(){
    btn.classList.remove('busy');
    btn.disabled=false;
  });
}

function render(data){
  document.getElementById('formArea').style.display='none';
  document.getElementById('pgTitle').style.display='none';

  var phs=[
    {k:'nahdi',n:t('nahdi'),e:t('nahdiE'),c:'nh'},
    {k:'united',n:t('united'),e:t('unitedE'),c:'un'},
    {k:'dawaa',n:t('dawaa'),e:t('dawaaE'),c:'dw'}
  ];

  var grp={nahdi:[],united:[],dawaa:[]};
  var cats=data.categories||[];
  for(var i=0;i<cats.length;i++){
    var prods=cats[i].products||[];
    for(var j=0;j<prods.length;j++){
      var p=prods[j];
      if(grp[p.pharmacy]){
        p.category=cats[i].category;
        grp[p.pharmacy].push(p);
      }
    }
  }

  var h='<div class="results"><div class="res-hdr"><div class="over">'+t('rOv')+'</div><h2>'+t('rH')+'</h2><p>'+t('rP')+'</p></div>';

  for(var x=0;x<phs.length;x++){
    var ph=phs[x];
    var items=grp[ph.k];
    h+='<div class="ph '+ph.c+(x===0?' open':'')+'" id="ph_'+ph.k+'">';
    h+='<div class="ph-bar" onclick="togPh(\''+ph.k+'\')">';
    h+='<span class="ph-dot"></span>';
    h+='<div class="ph-info"><div class="ph-name">'+ph.n+'</div><div class="ph-en">'+ph.e+'</div></div>';
    h+='<span class="ph-cnt">'+items.length+' '+t('itm')+'</span>';
    h+='<div class="ph-arr">▾</div>';
    h+='</div><div class="ph-body"><div class="ph-inner">';

    for(var y=0;y<items.length;y++){
      var pr=items[y];
      h+='<div class="pr">';
      h+='<div class="pr-top"><span class="pr-cat">'+esc(pr.category)+'</span>';
      h+='<a class="pr-link" href="'+esc(pr.url)+'" target="_blank" rel="noopener">'+t('vw')+' ↗</a></div>';
      h+='<div class="pr-name">'+esc(pr.name)+'</div>';
      h+='<div class="pr-use">'+esc(pr.usage)+'</div>';
      h+='</div>';
    }
    h+='</div></div></div>';
  }

  if(data.instructions&&data.instructions.length){
    h+='<div class="ins"><h4>'+t('insT')+'</h4><ol>';
    for(var z=0;z<data.instructions.length;z++){
      h+='<li>'+esc(data.instructions[z])+'</li>';
    }
    h+='</ol></div>';
  }

  h+='<button class="again-btn" onclick="rst()">'+t('re')+'</button></div>';

  document.getElementById('out').innerHTML=h;
  window.scrollTo({top:0,behavior:'smooth'});
}

function togPh(k){
  var el=document.getElementById('ph_'+k);
  if(el.classList.contains('open')) el.classList.remove('open');
  else el.classList.add('open');
}

function rst(){
  document.getElementById('out').innerHTML='';
  document.getElementById('formArea').style.display='';
  document.getElementById('pgTitle').style.display='';
  vT=null;vS=null;
  var cards=document.querySelectorAll('.type-card,.sub-btn');
  for(var i=0;i<cards.length;i++) cards[i].classList.remove('on');
  document.getElementById('ta').value='';
}

function showMsg(type,msg){
  var cls=type==='err'?'msg-err':'msg-lim';
  document.getElementById('out').innerHTML='<div class="msg '+cls+'">'+esc(msg)+'</div>';
}

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
</script>

</body>
</html>
